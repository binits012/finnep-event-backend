name: Backend Tests

on:
  push:
    branches: [master, main, 'feat/**']
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CI test suite
        run: npm run test:ci
        env:
          NODE_ENV: test
          JWT_TOKEN_SECRET: test-secret-key-minimum-32-characters-long
          GUEST_TOKEN_SECRET: test-guest-secret-key-minimum-32-characters
          INTERNAL_API_KEY: internal-queue-service-key
          STRIPE_KEY: sk_test_placeholder
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
